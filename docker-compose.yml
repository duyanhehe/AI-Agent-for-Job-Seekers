services:
  # Nginx load balancer (frontend + API reverse proxy)
  nginx:
    image: nginx:latest
    container_name: ai-job-app-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/logs:/var/log/nginx
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - fastapi1
      - fastapi2
      - frontend-build
    networks:
      - app-network
    restart: unless-stopped

  # Frontend Build Service (Automates npm run build)
  frontend-build:
    image: node:22-alpine
    container_name: ai-job-app-frontend-build
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run build"
    networks:
      - app-network

  # FastAPI Instance 1
  fastapi1:
    build: .
    container_name: ai-job-app-1
    environment:
      - PORT=8000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SESSION_EXPIRE_SECONDS=${SESSION_EXPIRE_SECONDS}
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
      - redis
      - chromadb
    networks:
      - app-network
    restart: unless-stopped

  # FastAPI Instance 2
  fastapi2:
    build: .
    container_name: ai-job-app-2
    environment:
      - PORT=8000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SESSION_EXPIRE_SECONDS=${SESSION_EXPIRE_SECONDS}
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
      - redis
      - chromadb
    networks:
      - app-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ai-job-app-postgres
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ai-job-app-redis
    networks:
      - app-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:latest
    container_name: ai-job-app-chroma
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ALLOW_RESET=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  frontend_dist:

networks:
  app-network:
    driver: bridge
